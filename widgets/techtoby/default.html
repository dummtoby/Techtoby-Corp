<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techtoby Widget</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.6);
            overflow: hidden;
            box-sizing: border-box;
        }

        .widget-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            width: 100%;
        }

        .profile-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title {
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="widget-content">
        <div class="profile-pic">
            <img src="../../media/100000.png" alt="TC" onerror="this.style.display='none'; this.parentNode.innerHTML='TC';">
        </div>
        <div class="details">
            <div class="title">Techtoby Corp</div>
            <div class="subtitle">System OS</div>
        </div>
    </div>
</body>
</html>
