<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Stats</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Clean deep glass look */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.5));
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 18px;
            box-sizing: border-box;
            backdrop-filter: blur(20px) saturate(1.8);
            -webkit-backdrop-filter: blur(20px) saturate(1.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 2px 2px rgba(255,255,255,0.8);
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            flex-direction: row;
            gap: 16px;
            padding: 0 24px;
        }

        .icon-wrapper {
            width: 44px;
            height: 44px;
            background: #ff0000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(255, 0, 0, 0.25);
            flex-shrink: 0;
        }

        .icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #111;
            line-height: 1;
            letter-spacing: -0.02em;
            display: flex;
            align-items: baseline;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 8px #ff0000;
            animation: pulse-anim 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulse-anim {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="icon-wrapper">
        <svg viewBox="0 0 24 24">
            <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
        </svg>
    </div>
    <div class="stats-container">
        <span class="stat-label">Subscribers</span>
        <div class="stat-value">
            <span id="subCount">10.5K</span>
            <span class="pulse"></span>
        </div>
    </div>
    <script>
        // Fake dynamic fluctuation
        setInterval(() => {
            let current = parseFloat(document.getElementById('subCount').innerText);
            if (Math.random() > 0.5) current += 0.1;
            document.getElementById('subCount').innerText = current.toFixed(1) + 'K';
        }, 15000);
    </script>
</body>
</html>
