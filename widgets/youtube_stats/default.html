<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Stats</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #000;
            overflow: hidden;
            position: relative;
            border-radius: 15px;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: blur(9px);
            transform: scale(1.1); /* Hides blurred edges */
        }

        .glass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* Liquid glass style */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), inset 0 1px 1px rgba(255, 255, 255, 0.6);
            pointer-events: none;
            box-sizing: border-box;
        }

        .widget-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header svg {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 2px 4px rgba(255, 0, 0, 0.2));
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-top: auto;
            margin-bottom: auto;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #000;
            line-height: 1;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .stat-value.increased {
            color: #10b981;
        }

        .stat-label-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .trend {
            font-size: 0.75rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.2);
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .footer-text {
            font-size: 0.7rem;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <video src="https://cdn.shawnyxx.dev/fileshare/cinematic-writing-on-a-whiteboard.mp4" autoplay loop muted playsinline class="bg-video"></video>
    <div class="glass-layer"></div>
    <div class="widget-wrapper">
        <div class="header">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#FF3D00" d="M43.2,33.9c-0.4,2.1-2.1,3.7-4.2,4c-3.3,0.5-8.8,1.1-15,1.1c-6.1,0-11.6-0.6-15-1.1c-2.1-0.3-3.8-1.9-4.2-4C4.4,31.6,4,28.2,4,24c0-4.2,0.4-7.6,0.8-9.9c0.4-2.1,2.1-3.7,4.2-4C12.3,9.6,17.8,9,24,9c6.2,0,11.6,0.6,15,1.1c2.1,0.3,3.8,1.9,4.2,4c0.4,2.3,0.9,5.7,0.9,9.9C44,28.2,43.6,31.6,43.2,33.9z"></path><path fill="#FFF" d="M20 31L20 17 32 24z"></path>
            </svg>
            <span class="channel-name">@dummtoby</span>
        </div>
        <div class="stats-container">
            <div class="stat-value" id="subCount">25</div>
            <div class="stat-label-row">
                <span class="stat-label">Last week</span>
            </div>
        </div>
    </div>
</body>
</html>
