<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Widget</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff; /* Light text for dark background */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Dark glass effect */
            background: rgba(20, 20, 25, 0.65);
            backdrop-filter: blur(35px) saturate(2);
            -webkit-backdrop-filter: blur(35px) saturate(2);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            overflow: hidden;
            box-sizing: border-box;
        }

        .clock-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .time {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            /* Gradient text */
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-variant-numeric: tabular-nums;
        }

        .time span {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0;
            margin-left: 2px;
            -webkit-text-fill-color: #a5b4fc; /* Solid color for AMPM */
        }

        .date {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">---</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Time
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('time').innerHTML = `${hours}:${minutes} <span>${ampm}</span>`;

            // Date
            const options = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
